format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold mauve"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "
style = "bold green"
detect_extensions = []

[python]
format = "[$symbol($version)]($style) "
symbol = " "
style = "bold yellow"

[rust]
format = "[$symbol($version)]($style) "
symbol = " "
style = "bold peach"

[cmd_duration]
format = "[$duration]($style) "
min_time = 2_000
style = "bold yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[docker_context]
disabled = true
